name = "mediunit-backend"
compatibility_date = "2024-02-25"
main = "src/index.js"

[pages]
build_output_dir = "frontend/out"

[vars]
ENVIRONMENT = "production"
ADMIN_EMAIL = "abdel@mediunit.ma" # Email for receiving new registration alerts

migrations_dir = "migrations"

[[d1_databases]]
binding = "DB"
database_name = "mediunit_db"
database_id = "87f7686a-bba3-4b9a-9407-3d261e8ff224"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "mediunit-storage"

[[kv_namespaces]]
binding = "LIMITER"
id = "9d02fd34377d437cabcdc27669783fc9"
preview_id = "830424ffdc8043f8bb8b944b4b8e8d39"

